    <script>
      // Set html[lang] before the module bundle parses, so screen readers
      // pick the right voice engine on the first frame.
      (function () {
        try {
          var v = localStorage.getItem("cscDiag.lang");
          if (v === "en" || v === "zh-Hans") {
            document.documentElement.lang = v;
          }
        } catch (e) { /* localStorage blocked */ }
      })();
