<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apple touch icon — CSC Self-Checks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 180px; height: 180px; overflow: hidden; }
  body {
    background: #0f4c81;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .icon {
    width: 180px; height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background:
      radial-gradient(circle at 30% 25%, #1561a5 0%, transparent 55%),
      linear-gradient(135deg, #0f4c81 0%, #0a3a66 100%);
  }
  .icon::before {
    content: "";
    position: absolute;
    inset: 12px;
    border-radius: 34px;
    border: 2px solid rgba(255,255,255,0.12);
  }
  svg {
    width: 96px;
    height: 96px;
    color: #fff;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
  }
  .accent-dot {
    position: absolute;
    bottom: 26px;
    right: 26px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #c2410c;
    box-shadow: 0 0 0 3px #0f4c81, 0 0 0 5px rgba(194, 65, 12, 0.4);
  }
</style>
</head>
<body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M9 11l3 3L22 4"></path>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
    </svg>
    <span class="accent-dot"></span>
  </div>
</body>
</html>
